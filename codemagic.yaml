workflows:
  expo-eas-build:
    name: Expo Android Build
    max_build_duration: 60
    environment:
      node: latest
      vars:
        EXPO_TOKEN: $EXPO_TOKEN  # Set this in Codemagic app variables
    scripts:
      - npm install
      - npm install -g eas-cli
      - eas login --non-interactive
      - eas build -p android --profile preview --non-interactive
    artifacts:
      - build/**
